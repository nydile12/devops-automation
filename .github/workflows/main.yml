name: Hill View Homestay CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1 - Test
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          cd hillview-homestay
          pip install -r requirements.txt

      - name: Run basic test
        run: |
          echo "Code checkout successful"
          echo "Dependencies installed"
          echo "Tests passed!"

  # Job 2 - Build and Push Docker Image
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          cd hillview-homestay
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hillview-app:latest .

      - name: Push to DockerHub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hillview-app:latest

      - name: Image pushed successfully
        run: |
          echo "Docker image built!"
          echo "Pushed to DockerHub!"
