{% extends "base.html" %}

{% block content %}

<section class="success-page">
    <div class="success-card">
        <div class="success-icon">
            <i class="fas fa-envelope-open-text" style="color:var(--primary)">
            </i>
        </div>
        <h2 style="color:var(--primary);
                   margin-bottom:15px;">
            Message Sent!
        </h2>
        <p style="color:#666;
                  margin-bottom:30px;">
            Thank you for reaching out!
            We'll get back to you within
            24 hours.
        </p>
        <div style="background:var(--light);
                    border-radius:10px;
                    padding:20px;
                    margin-bottom:25px;">
            <p style="color:#666;margin:0;">
                <i class="fas fa-phone" style="color:var(--primary)">
                </i>
                For urgent queries call:
                <strong>+91 XXXXXXXXXX</strong>
            </p>
        </div>
        <a href="/" class="btn-primary-custom">
            <i class="fas fa-home"></i>
            Back to Home
        </a>
    </div>
</section>

{% endblock %}
